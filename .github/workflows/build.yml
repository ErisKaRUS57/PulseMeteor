name: Build Pulse Meteor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle (system)
        run: gradle build --no-daemon

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PulseMeteor-JAR
          path: build/libs/*.jar
